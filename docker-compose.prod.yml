# Production / standalone compose overlay.
#
# This file is what runs on the VM and what a teammate would use to
# reproduce the stack from DockerHub images alone (no local source).
# It mirrors docker-compose.yml in shape and env, but references
# pre-built images instead of `build:` contexts.
#
# Image names are templated from env so the same file works locally
# (e.g. ishtiakrahman/ticket-analyzer-backend:v1) and on the VM (where the
# tag may have been bumped to v1.1 after a fix).
#
# Usage:
#   1. Populate a deploy-time .env with DOCKERHUB_USER, BACKEND_TAG, FRONTEND_TAG.
#   2. `docker compose -f docker-compose.prod.yml up -d`.
#
# No secrets are committed. The deploy-time .env is created on the
# target machine and never enters git.

services:
  db:
    image: postgres:16-alpine
    container_name: ticket-analyzer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres is intentionally NOT exposed on a public port.
    # See IMPLEMENTATION_PLAN §10 / Risk Register — only the frontend
    # port is published. Local debugging uses `docker compose exec db psql ...`
    # or an SSH tunnel.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ticket_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USER:-ishtiakrahman}/ticket-analyzer-backend:${BACKEND_TAG:-v1}
    container_name: ticket-analyzer-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/ticket_db}
      MODEL_NAME: ${MODEL_NAME:-distilbert-base-uncased-finetuned-sst-2-english}
      HF_HOME: ${HF_HOME:-/opt/hf-cache}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    # Backend is intentionally NOT published publicly. It is reached via
    # the frontend's nginx proxy. Only the frontend exposes a port.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USER:-ishtiakrahman}/ticket-analyzer-frontend:${FRONTEND_TAG:-v1}
    container_name: ticket-analyzer-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Only the frontend's port is exposed. 3000 (nginx) is the single
      # public ingress; everything else is on the internal compose network.
      - "${FRONTEND_PUBLIC_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  pgdata:
    name: ticket-analyzer-pgdata
